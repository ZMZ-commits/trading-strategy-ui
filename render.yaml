services:
  - type: static
    name: trading-strategy-ui
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        sync: false   # Set to your backend Render URL, e.g. https://trading-strategy-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
